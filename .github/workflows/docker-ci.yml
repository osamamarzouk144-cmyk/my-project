name: Docker CI CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # هنا كتبنا اسم مستخدم دوكر هاب الصافي بتاعك صراحة عشان نلغي احتمالية أي مسافة أو غلطة
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: osos1212
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # وهنا حددنا يرفع على حسابك osos1212 صراحة
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: osos1212/my-java-app:latest